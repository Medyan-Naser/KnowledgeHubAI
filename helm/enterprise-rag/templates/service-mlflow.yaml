{{- if .Values.mlflow.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "enterprise-rag.fullname" . }}-mlflow
  labels:
    {{- include "enterprise-rag.labels" . | nindent 4 }}
    app.kubernetes.io/component: mlflow
spec:
  type: {{ .Values.mlflow.service.type }}
  ports:
    - port: {{ .Values.mlflow.service.port }}
      targetPort: http
      protocol: TCP
      name: http
      {{- if and (eq .Values.mlflow.service.type "NodePort") .Values.mlflow.service.nodePort }}
      nodePort: {{ .Values.mlflow.service.nodePort }}
      {{- end }}
  selector:
    {{- include "enterprise-rag.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: mlflow
{{- end }}
