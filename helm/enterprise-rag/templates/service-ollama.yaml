{{- if .Values.ollama.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "enterprise-rag.fullname" . }}-ollama
  labels:
    {{- include "enterprise-rag.labels" . | nindent 4 }}
    app.kubernetes.io/component: ollama
spec:
  type: ClusterIP
  ports:
    - port: 11434
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "enterprise-rag.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: ollama
{{- end }}
