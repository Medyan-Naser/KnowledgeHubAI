{{- if .Values.temporal.ui.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "enterprise-rag.fullname" . }}-temporal-ui
  labels:
    {{- include "enterprise-rag.labels" . | nindent 4 }}
    app.kubernetes.io/component: temporal-ui
spec:
  type: {{ .Values.temporal.ui.service.type }}
  ports:
    - port: {{ .Values.temporal.ui.service.port }}
      targetPort: http
      protocol: TCP
      name: http
      {{- if and (eq .Values.temporal.ui.service.type "NodePort") .Values.temporal.ui.service.nodePort }}
      nodePort: {{ .Values.temporal.ui.service.nodePort }}
      {{- end }}
  selector:
    {{- include "enterprise-rag.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: temporal-ui
{{- end }}
