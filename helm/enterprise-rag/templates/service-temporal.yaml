{{- if .Values.temporal.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "enterprise-rag.fullname" . }}-temporal
  labels:
    {{- include "enterprise-rag.labels" . | nindent 4 }}
    app.kubernetes.io/component: temporal
spec:
  type: ClusterIP
  ports:
    - port: 7233
      targetPort: frontend
      protocol: TCP
      name: frontend
  selector:
    {{- include "enterprise-rag.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: temporal
{{- end }}
