---
# Temporal Server (simplified for development)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal
  namespace: enterprise-rag
  labels:
    app: temporal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: temporal
  template:
    metadata:
      labels:
        app: temporal
    spec:
      containers:
        - name: temporal
          image: temporalio/auto-setup:1.22.4
          ports:
            - containerPort: 7233
              name: frontend
            - containerPort: 7234
              name: history
            - containerPort: 7235
              name: matching
            - containerPort: 7239
              name: worker
          env:
            - name: SKIP_DB_CREATE
              value: "true"
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
          livenessProbe:
            tcpSocket:
              port: 7233
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 7233
            initialDelaySeconds: 10
            periodSeconds: 5

---
# Temporal Web UI
apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal-web
  namespace: enterprise-rag
  labels:
    app: temporal-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: temporal-web
  template:
    metadata:
      labels:
        app: temporal-web
    spec:
      containers:
        - name: temporal-web
          image: temporalio/ui:2.21.3
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: TEMPORAL_ADDRESS
              value: "temporal-frontend:7233"
            - name: TEMPORAL_CORS_ORIGINS
              value: "http://localhost:3000"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"

---
# Temporal Frontend Service
apiVersion: v1
kind: Service
metadata:
  name: temporal-frontend
  namespace: enterprise-rag
  labels:
    app: temporal
spec:
  type: ClusterIP
  ports:
    - port: 7233
      targetPort: 7233
      protocol: TCP
      name: frontend
  selector:
    app: temporal

---
# Temporal Web UI Service
apiVersion: v1
kind: Service
metadata:
  name: temporal-web
  namespace: enterprise-rag
  labels:
    app: temporal-web
spec:
  type: NodePort
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30088
      protocol: TCP
      name: http
  selector:
    app: temporal-web
