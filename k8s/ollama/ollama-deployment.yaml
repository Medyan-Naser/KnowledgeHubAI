---
# PersistentVolumeClaim for Ollama models
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-models
  namespace: enterprise-rag
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi

---
# Ollama Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: enterprise-rag
  labels:
    app: ollama
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      containers:
        - name: ollama
          image: ollama/ollama:latest
          ports:
            - containerPort: 11434
              name: http
          env:
            - name: OLLAMA_HOST
              value: "0.0.0.0:11434"
          volumeMounts:
            - name: models
              mountPath: /root/.ollama
          resources:
            requests:
              memory: "2Gi"
              cpu: "1000m"
            limits:
              memory: "8Gi"
              cpu: "4000m"
          livenessProbe:
            httpGet:
              path: /
              port: 11434
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 11434
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: ollama-models

---
# Ollama Service
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: enterprise-rag
  labels:
    app: ollama
spec:
  type: ClusterIP
  ports:
    - port: 11434
      targetPort: 11434
      protocol: TCP
      name: http
  selector:
    app: ollama

---
# Job to pull required models
apiVersion: batch/v1
kind: Job
metadata:
  name: ollama-pull-models
  namespace: enterprise-rag
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: pull-models
          image: ollama/ollama:latest
          command:
            - sh
            - -c
            - |
              echo "Waiting for Ollama service..."
              until wget -q -O- http://ollama:11434/ > /dev/null 2>&1; do
                echo "Waiting for Ollama..."
                sleep 5
              done
              
              echo "Pulling llama3 model..."
              ollama pull llama3
              
              echo "Pulling nomic-embed-text model..."
              ollama pull nomic-embed-text
              
              echo "Models pulled successfully!"
          env:
            - name: OLLAMA_HOST
              value: "http://ollama:11434"
  backoffLimit: 3
