apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: enterprise-rag-postgres
  namespace: enterprise-rag
spec:
  instances: 3  # 1 primary + 2 replicas for HA
  
  # Enable superuser access for password authentication
  enableSuperuserAccess: true
  
  # PostgreSQL configuration
  postgresql:
    parameters:
      max_connections: "200"
      shared_buffers: "256MB"
      effective_cache_size: "1GB"
      maintenance_work_mem: "64MB"
      checkpoint_completion_target: "0.9"
      wal_buffers: "16MB"
      default_statistics_target: "100"
      random_page_cost: "1.1"
      effective_io_concurrency: "200"
      work_mem: "2621kB"
      min_wal_size: "1GB"
      max_wal_size: "4GB"
    
    # Enable pgvector extension
    shared_preload_libraries:
      - "vector"
  
  # Bootstrap configuration
  bootstrap:
    initdb:
      database: enterprise_rag
      owner: postgres
      postInitSQL:
        - CREATE EXTENSION IF NOT EXISTS vector;
        - CREATE EXTENSION IF NOT EXISTS "uuid-ossp";
  
  # Storage configuration
  storage:
    size: 10Gi
    storageClass: standard  # Use your cluster's default or specify
  
  # Resources
  resources:
    requests:
      memory: "512Mi"
      cpu: "500m"
    limits:
      memory: "2Gi"
      cpu: "2000m"
